title: Flavien Moreau
description: >-
  Personal website of Flavien Moreau.
url: "https://www.flavienmoreau.io"   # your live URL
baseurl: ""                            # leave empty for a root-domain user site

author:
  name: Flavien Moreau
  role: Economist
  affiliation: IMF

email: fmoreau@imf.org

# Links — leave a value empty ("") to hide that link everywhere.
social:
  scholar:  "https://scholar.google.com/citations?user=FSoQ5W0AAAAJ"                 # full Google Scholar profile URL
  repec:    "https://ideas.repec.org/f/pmo1302.html"                 # full RePEc/IDEAS URL
  github:   "flavienmoreau"    # username only
  linkedin: "https://www.linkedin.com/in/flavien-moreau-2a0316149"                 # full LinkedIn URL
  twitter:  ""                 # X/Twitter username only
  cv:       "/assets/cv.pdf"   # drop your CV here as assets/cv.pdf

# Navigation (order matters)
nav:
  - title: Home
    url: /
  - title: Research
    url: /research/
  - title: CV
    url: /cv/

# Build settings — do not change unless you know why.
markdown: kramdown
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
